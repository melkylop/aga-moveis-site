<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Testes · AGA Móveis</title>
<style>
  :root {
    --ok: #1f7a3a;
    --fail: #b3261e;
    --pending: #8a6d3b;
    --bg: #faf7f2;
    --ink: #1e0e10;
    --wine: #6e1622;
    --line: rgba(110, 22, 34, 0.18);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: ui-sans-serif, system-ui, "DM Sans", sans-serif;
    background: var(--bg);
    color: var(--ink);
    padding: 40px 24px 80px;
  }
  .wrap { max-width: 920px; margin: 0 auto; }
  h1 {
    font-family: ui-serif, "Instrument Serif", Georgia, serif;
    font-weight: 400;
    font-size: 48px;
    margin: 0 0 4px;
    color: var(--wine);
  }
  .sub {
    font-family: ui-monospace, "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 32px;
  }
  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 28px;
  }
  .controls button {
    background: var(--wine);
    color: #fff;
    border: none;
    padding: 10px 20px;
    border-radius: 999px;
    font-weight: 500;
    cursor: pointer;
    font-size: 13px;
  }
  .controls button:disabled { opacity: 0.5; cursor: progress; }
  .summary {
    margin-left: auto;
    font-family: ui-monospace, monospace;
    font-size: 13px;
  }
  .summary .ok { color: var(--ok); font-weight: 600; }
  .summary .fail { color: var(--fail); font-weight: 600; }
  .results { display: grid; gap: 10px; }
  .test {
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 14px 18px;
    background: #fff;
    display: grid;
    grid-template-columns: 22px 1fr auto;
    gap: 14px;
    align-items: start;
  }
  .test .icon {
    width: 22px; height: 22px;
    border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    color: #fff;
    font-size: 13px;
    line-height: 1;
  }
  .test .icon.pending { background: var(--pending); }
  .test .icon.ok { background: var(--ok); }
  .test .icon.fail { background: var(--fail); }
  .test .name {
    font-family: ui-monospace, monospace;
    font-size: 13px;
    font-weight: 500;
  }
  .test .msg {
    font-size: 13px;
    color: #444;
    margin-top: 4px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .test .time {
    font-family: ui-monospace, monospace;
    font-size: 11px;
    color: #999;
  }
  iframe {
    width: 100%;
    height: 360px;
    border: 1px solid var(--line);
    border-radius: 10px;
    margin-top: 32px;
    background: #fff;
  }
  .note {
    margin-top: 18px;
    font-size: 12px;
    color: #666;
    line-height: 1.5;
  }
</style>
</head>
<body>
  <div class="wrap">
    <h1>Testes do site</h1>
    <div class="sub">AGA Móveis · smoke runner</div>

    <div class="controls">
      <button id="run">Rodar testes</button>
      <button id="reset" type="button">Limpar localStorage do alvo</button>
      <div class="summary" id="summary">aguardando…</div>
    </div>

    <div id="results" class="results"></div>

    <p class="note">Os testes carregam <code>../index.html</code> em um iframe e inspecionam o DOM resultante. Se algum teste falhar, abra o DevTools (F12), aba <em>Console</em>, para detalhes.</p>

    <iframe id="alvo" src="about:blank" title="Site sob teste"></iframe>
  </div>

  <script src="smoke.test.js"></script>
  <script>
    document.getElementById('run').addEventListener('click', () => window.runSmokeTests());
    document.getElementById('reset').addEventListener('click', () => {
      try {
        const iframe = document.getElementById('alvo');
        iframe.contentWindow && iframe.contentWindow.localStorage && iframe.contentWindow.localStorage.removeItem('aga_lgpd_consent');
        alert('localStorage do iframe limpo.');
      } catch (e) {
        alert('Não foi possível limpar — recarregue a página.');
      }
    });
    // dispara automaticamente
    window.addEventListener('load', () => window.runSmokeTests());
  </script>
</body>
</html>
