# =============================================================================
# AGA Móveis — Exemplos de configuração de headers de segurança
# =============================================================================
# Este arquivo NÃO é carregado pelo site. Ele é uma referência para quem for
# fazer o deploy em servidor próprio (Nginx, Apache) ou em plataforma como
# Netlify, Vercel ou Cloudflare Pages.
#
# Escolha o bloco que corresponde ao seu ambiente e copie as diretivas.
# =============================================================================


# -----------------------------------------------------------------------------
# NGINX
# -----------------------------------------------------------------------------
# server {
#   listen 443 ssl http2;
#   server_name agamoveis.com.br www.agamoveis.com.br;
#
#   add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
#   add_header X-Frame-Options "SAMEORIGIN" always;
#   add_header X-Content-Type-Options "nosniff" always;
#   add_header Referrer-Policy "strict-origin-when-cross-origin" always;
#   add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
#
#   add_header Content-Security-Policy "
#     default-src 'self';
#     script-src 'self' https://unpkg.com;
#     style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
#     font-src 'self' https://fonts.gstatic.com;
#     img-src 'self' data:;
#     connect-src 'self';
#     frame-ancestors 'self';
#     base-uri 'self';
#     form-action 'self';
#   " always;
# }


# -----------------------------------------------------------------------------
# APACHE (.htaccess)
# -----------------------------------------------------------------------------
# <IfModule mod_headers.c>
#   Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
#   Header always set X-Frame-Options "SAMEORIGIN"
#   Header always set X-Content-Type-Options "nosniff"
#   Header always set Referrer-Policy "strict-origin-when-cross-origin"
#   Header always set Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()"
#   Header always set Content-Security-Policy "default-src 'self'; script-src 'self' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';"
# </IfModule>


# -----------------------------------------------------------------------------
# NETLIFY (arquivo _headers na raiz do publish directory)
# -----------------------------------------------------------------------------
# /*
#   Strict-Transport-Security: max-age=63072000; includeSubDomains; preload
#   X-Frame-Options: SAMEORIGIN
#   X-Content-Type-Options: nosniff
#   Referrer-Policy: strict-origin-when-cross-origin
#   Permissions-Policy: camera=(), microphone=(), geolocation=(), payment=(), usb=()
#   Content-Security-Policy: default-src 'self'; script-src 'self' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';


# -----------------------------------------------------------------------------
# VERCEL (vercel.json na raiz do projeto)
# -----------------------------------------------------------------------------
# {
#   "headers": [
#     {
#       "source": "/(.*)",
#       "headers": [
#         { "key": "Strict-Transport-Security", "value": "max-age=63072000; includeSubDomains; preload" },
#         { "key": "X-Frame-Options", "value": "DENY" },
#         { "key": "X-Content-Type-Options", "value": "nosniff" },
#         { "key": "Referrer-Policy", "value": "strict-origin-when-cross-origin" },
#         { "key": "Permissions-Policy", "value": "camera=(), microphone=(), geolocation=(), payment=(), usb=()" },
#         { "key": "Content-Security-Policy", "value": "default-src 'self'; script-src 'self' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" }
#       ]
#     }
#   ]
# }


# -----------------------------------------------------------------------------
# CLOUDFLARE PAGES (arquivo _headers, formato idêntico ao Netlify)
# -----------------------------------------------------------------------------
# /*
#   Strict-Transport-Security: max-age=63072000; includeSubDomains; preload
#   X-Frame-Options: SAMEORIGIN
#   ...etc.


# =============================================================================
# NOTAS IMPORTANTES SOBRE A CSP
# =============================================================================
#
# 1. CSP de script-src já está ESTRITA. 'unsafe-inline' e 'unsafe-eval' foram
#    removidos quando o JSX passou a ser pré-compilado (npm run build).
#    Se você reintroduzir Babel Standalone no navegador, esses dois flags
#    precisam voltar (e a segurança regride).
#
# 2. 'unsafe-inline' em style-src é exigência do React quando se usa o atributo
#    style={{...}} em JSX. Para remover, mover todos os estilos inline para
#    classes CSS.
#
# 3. Se adicionar Google Analytics, Tag Manager, Facebook Pixel ou qualquer
#    outro script de terceiro: ATUALIZAR a CSP com o domínio correspondente.
#    Sem isso, o script será bloqueado.
#
# 4. Testar a CSP em modo "report-only" antes de aplicar:
#    Content-Security-Policy-Report-Only: ...
#    Assim erros aparecem no console sem quebrar o site.
#
# 5. Validar a configuração em: https://securityheaders.com/ — meta: nota A+.
# =============================================================================
